name: 🎭 Opera Daily Report

on:
  schedule:
    # 每天 UTC 00:00 = 北京时间 08:00
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  crawl-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawlers & generate report
        run: |
          python orchestrator.py
        continue-on-error: true  # 即使部分爬虫失败也继续

      - name: Commit and push data
        run: |
          git config --local user.email "opera-bot@users.noreply.github.com"
          git config --local user.name "Opera Daily Bot"
          git add -A
          # 如果没有变更则跳过
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "🎭 daily: $(date +'%Y-%m-%d') opera report"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4